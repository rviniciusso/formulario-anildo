<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Formulario</h1>
    <form>
        <fieldset>
            <legend>Dados pessoais</legend>
        <label for="campo-nome">Nome:</label>
        <input id="campo-nome"type="text" placeholder="digite seu nome" required>

        <br>
        <br>

        <label for="campo-email">Endereço:</label>
        <input id="campo-email" type="text" placeholder="digite seu email" required> 

        <br>
        <br>

        <label for="campo-senha">Cidade:</label>
        <input id="campo-senha" type="text" placeholder="digite sua senha" required>
        

        <br>
        <br>

        <label for="assunto">Estado:</label>
        <select id="assunto" name="cores">
            <option selected disabled value=" ">Escolha um estado</option>
            <option value="Bahia">Bahia</option>
            <option value="Mato Grosso">Mato Grosso</option>
        </select>
        </fieldset>
        <br>
        <fieldset>
            <legend>Dados Profissionais</legend>
    
        <p>Natureza do Cargo</p>

        <input id="1" type="radio" name="1" value="12">
        <label for="1">Gerência</label>
        <input id="2" type="radio" name="1" value="12">
        <label for="2">Financiero</label>
        <input id="3" type="radio" name="1" value="12">
        <label for="3">Recepção</label>
        <input id="4" type="radio" name="1" value="12">
        <label for="4">Administrativo</label>
        <input id="5" type="radio" name="1" value="12">
        <label for="5">Juridico</label>

        <p>Área de Interesse</p>

        <input id="1" type="checkbox" name="1" value="12">
        <label for="1">Computação</label>
        <input id="2" type="checkbox" name="1" value="12">
        <label for="2">Biologia</label>
        <input id="3" type="checkbox" name="1" value="12">
        <label for="3">Meio Ambiente</label>
        <input id="4" type="checkbox" name="1" value="12">
        <label for="4">Engenharia</label>
        <input id="5" type="checkbox" name="1" value="12">
        <label for="5">Historia</label>
        
        
        <br>
        <br>


        <label for="curriculo">Mini_currículo:</label>
        <textarea id="curriculo" rows="5" cols="45" placeholder="Digite aqui" name="comentario"></textarea>

        <br>
        <br>
         

        </fieldset>

        <br>

        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    
    </form>

    <br>

    

</body>
</html>
